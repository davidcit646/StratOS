name: QEMU Boot Test

on:
  push:
  pull_request:

jobs:
  qemu-boot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU/OVMF Tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            ovmf \
            gdisk \
            erofs-utils \
            btrfs-progs \
            xfsprogs \
            dosfstools \
            kpartx \
            gnu-efi \
            gcc \
            binutils \
            mtools

      - name: Prepare Scripts
        run: |
          chmod +x scripts/phase0/create-qemu-disk-image.sh
          chmod +x scripts/phase1/create-partition-layout.sh
          chmod +x scripts/phase1/format-partitions.sh
          chmod +x scripts/phase1/validate-mounts.sh
          chmod +x scripts/phase2/build-efi-var-test.sh
          chmod +x scripts/phase2/run-efi-var-tests.sh
          chmod +x tests/qemu-boot-test.sh
          chmod +x tests/phase1-partition-layout-test.sh
          chmod +x tests/phase2-rust-efi-vars-test.sh

      - name: Create StratOS Disk Layout Image
        run: |
          ./scripts/phase0/create-qemu-disk-image.sh \
            --image out/stratos-phase0.raw \
            --size-gb 256 \
            --force

      - name: Resolve UEFI Shell ISO
        id: shell
        run: |
          shell_iso=""
          for candidate in \
            /usr/share/OVMF/UefiShell.iso \
            /usr/share/ovmf/UefiShell.iso \
            /usr/share/edk2/ovmf/UefiShell.iso
          do
            if [ -f "$candidate" ]; then
              shell_iso="$candidate"
              break
            fi
          done
          echo "path=$shell_iso" >> "$GITHUB_OUTPUT"

      - name: Run QEMU Boot Test
        run: |
          if [ -n "${{ steps.shell.outputs.path }}" ]; then
            ./tests/qemu-boot-test.sh \
              --disk out/stratos-phase0.raw \
              --cdrom "${{ steps.shell.outputs.path }}" \
              --success-regex "Shell>" \
              --timeout 180 \
              --memory 2048 \
              --cpus 2
          else
            ./tests/qemu-boot-test.sh \
              --disk out/stratos-phase0.raw \
              --success-regex "BdsDxe:" \
              --timeout 180 \
              --memory 2048 \
              --cpus 2
          fi

      - name: Run Phase 1 Partition Layout Test
        run: |
          ./tests/phase1-partition-layout-test.sh \
            --image out/stratos-phase1.raw \
            --size-gb 256

      - name: Run Phase 2 EFI Variable Tests
        run: |
          ./scripts/phase2/run-efi-var-tests.sh

      - name: Run Phase 2 Rust EFIVARFS Test
        run: |
          ./tests/phase2-rust-efi-vars-test.sh

      - name: Upload Serial Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-serial-log
          path: out/qemu-serial.log
